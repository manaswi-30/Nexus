name: NEXUS CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests & Coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn websockets pydantic pydantic-settings
          pip install python-dotenv sqlalchemy psycopg2-binary alembic
          pip install python-jose passlib bcrypt==4.0.1 python-multipart
          pip install pytest pytest-asyncio pytest-cov httpx
          pip install numpy

      - name: Create test env file
        run: |
          echo "DATABASE_URL=sqlite:///./test_nexus.db" >> .env
          echo "JWT_SECRET=test-secret-key-for-ci" >> .env
          echo "JWT_ALGORITHM=HS256" >> .env
          echo "JWT_EXPIRE_MINUTES=60" >> .env
          echo "SECRET_KEY=test-secret-key" >> .env
          echo "ALLOWED_ORIGINS=http://localhost:5173" >> .env

      - name: Run tests with coverage
        run: |
          pytest backend/tests/ -v --cov=backend --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage